spring.application.name=poker-rating

spring.datasource.url=jdbc:postgresql://localhost:5432/poker_rating
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Moscow

spring.flyway.enabled=true
logging.level.org.flywaydb=DEBUG
spring.flyway.locations=classpath:db/migration

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=poker-rating-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.antonk404.poker_rating.infrastructure.messaging.event
spring.kafka.consumer.properties.spring.json.use.type.headers=false
